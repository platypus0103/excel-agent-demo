<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>LLM 聊天室</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='LLMweb.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Luckysheet -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/css/pluginsCss.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/plugins.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/css/luckysheet.css' />
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/js/plugin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/luckysheet.umd.js"></script>
    
    <!-- Luckysheet 載入檢測和備用方案 -->
    <script>
        window.addEventListener('load', function() {
            console.log('頁面載入完成，檢查 Luckysheet...');
            setTimeout(function() {
                if (typeof luckysheet === 'undefined') {
                    console.warn('主要 CDN 載入失敗，嘗試備用 CDN...');
                    // 備用 CDN
                    const script = document.createElement('script');
                    script.src = 'https://unpkg.com/luckysheet@latest/dist/luckysheet.umd.js';
                    script.onload = function() {
                        console.log('備用 CDN 載入成功');
                    };
                    script.onerror = function() {
                        console.error('備用 CDN 也載入失敗');
                    };
                    document.head.appendChild(script);
                }
            }, 2000);
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <button class="sidebar-toggle-btn" id="sidebarToggleBtn" title="收納側邊欄">&#x276E;</button>
            <div class="sidebar-header">
                <h3>試算表列表</h3>
                <button id="addCaseBtn" class="add-case-btn">+</button>
            </div>
            <ul id="caseList" class="case-list">
                <!-- 項目將由 JS 動態載入 -->
            </ul>
        </div>

        <div class="main">
            <div class="excel-box" id="excelBox">
                <div id="excel-controls">
                    <input type="file" id="fileInput" accept=".xlsx, .xls">
                    <button id="importBtn" style="display: none;">匯入 Excel</button>
                    <button id="releaseMemoryBtn" class="price-rolling-btn" onclick="releaseMemory()">釋放記憶體</button>
                    <span id="excel-status">請選擇 Excel 檔案</span>
                </div>
                <div id="luckysheet-container">
                    <!-- Luckysheet 將在這裡初始化 -->
                </div>
            </div>

            <div class="llm-box">
                <div class="llm-header">
                    <div style="display:flex; align-items:center;">
                        <div class="llm-logo">LLM</div>
                        <span id="caseTitle">請選擇或新增試算表</span>
                    </div>
                    <!-- 模型選擇 -->
                    <div class="model-selector-area">
                        <select id="modelSelector" class="model-selector" onchange="switchModel(this.value)" title="切換模型">
                            <option value="qwen3:4b">qwen3:4b</option>
                            <option value="qwen3:14b">qwen3:14b</option>
                            <option value="qwen3:32b">qwen3:32b</option>
                        </select>
                    </div>
                    <!-- Email 登入區域 -->
                    <div id="emailLoginArea" class="email-login-area">
                        <input type="email" id="emailInput" class="email-input" placeholder="輸入 Email">
                        <button id="loginBtn" class="email-login-btn">登入</button>
                    </div>
                    <div id="emailUserArea" class="email-user-area" style="display:none;">
                        <span id="emailDisplay" class="email-display"></span>
                        <button id="logoutBtn" class="email-logout-btn">登出</button>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages"></div>


                <div class="chat-input">
                    <textarea id="userInput" placeholder="輸入訊息... (Enter 送出，Shift+Enter 換行)"></textarea>
                    <button id="sendBtn">送出</button>
                </div>
            </div>
        </div>
    </div>

<script src="{{ url_for('static', filename='LLMweb.js') }}?v={{ range(1, 99999) | random }}"></script>
</body>
</html>
